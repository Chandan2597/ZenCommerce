{% extends 'base.html' %}
{% block content %}
<div class="auth-container">
    <h2 class="auth-title">Welcome Back</h2>
    {% if error %}
    <div style="background: rgba(239, 68, 68, 0.1); color: #EF4444; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem;">
        {{ error }}
    </div>
    {% endif %}
    <form method="POST" action="/login/">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control" required placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Log In</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        Don't have an account? <a href="/signup/" style="color: var(--primary); font-weight: 500;">Sign up</a>
    </p>
</div>
{% endblock %}

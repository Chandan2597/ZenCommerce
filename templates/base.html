<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenCommerce</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #4F46E5; /* Indigo 600 */
            --primary-hover: #4338CA;
            --secondary: #10B981; /* Emerald 500 */
            --background: #F3F4F6; /* Gray 100 */
            --surface: #FFFFFF;
            --text-main: #111827; /* Gray 900 */
            --text-muted: #6B7280; /* Gray 500 */
            --border: #E5E7EB;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius: 12px;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Glassmorphism Navbar */
        .navbar {
            backdrop-filter: blur(10px);
            background-color: rgba(255, 255, 255, 0.85);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
        }
        
        .navbar-brand:hover {
            opacity: 0.8;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-item {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
        }

        .nav-item:hover {
            color: var(--primary);
            background-color: rgba(79, 70, 229, 0.05);
        }

        .cart-badge {
            background-color: var(--primary);
            color: white;
            font-size: 0.75rem;
            padding: 0.1rem 0.5rem;
            border-radius: 9999px;
            font-weight: 700;
        }

        /* Container */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem;
            flex: 1;
        }

        /* Products Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        /* Product Card */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: var(--transition);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .card-img-wrapper {
            position: relative;
            padding-top: 75%; /* 4:3 Aspect Ratio */
            overflow: hidden;
            background-color: #f9f9f9;
        }

        .card-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: var(--transition);
            padding: 1rem;
        }
        
        .card:hover .card-img {
            transform: scale(1.05);
        }

        .card-body {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .card-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin: 0 0 0.5rem 0;
            color: var(--text-main);
        }

        .card-price {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            font-weight: 500;
            text-align: center;
            border: none;
            cursor: pointer;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            transition: var(--transition);
            text-decoration: none;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .btn-outline:hover {
            background-color: #f9fafb;
            border-color: var(--text-muted);
        }

        /* Forms */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: var(--transition);
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        
        /* Auth Container */
        .auth-container {
            max-width: 450px;
            margin: 4rem auto;
            background: var(--surface);
            padding: 2.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
        }
        
        .auth-title {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.75rem;
            color: var(--text-main);
        }

        /* Footer */
        .footer {
            background-color: var(--surface);
            border-top: 1px solid var(--border);
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            margin-top: auto;
        }

        /* Cart controls */
        .cart-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }
        
        .cart-btn {
            background: var(--background);
            border: 1px solid var(--border);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-main);
        }
        
        .cart-btn:hover {
            background: var(--border);
        }
        
        .cart-qty {
            font-weight: 600;
            font-size: 1.125rem;
            width: 2rem;
            text-align: center;
        }

        /* Badge/Filters */
        .filter-container {
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }
        
        .filter-pill {
            padding: 0.5rem 1.25rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 9999px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            white-space: nowrap;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }
        
        .filter-pill:hover, .filter-pill.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <i class="fa-solid fa-store"></i> ZenCommerce
        </a>
        <div class="nav-links">
            <a href="/store/" class="nav-item">
                <i class="fa-solid fa-box-open"></i> Store
            </a>
            <a href="/cart/" class="nav-item">
                <i class="fa-solid fa-shopping-cart"></i> Cart
                <span class="cart-badge">{{ request.session.cart.keys|length }}</span>
            </a>
            
            {% if request.session.customer %}
                <a href="/orders/" class="nav-item">
                    <i class="fa-solid fa-receipt"></i> Orders
                </a>
                <a href="/logout/" class="nav-item">
                    <i class="fa-solid fa-sign-out-alt"></i> Logout
                </a>
            {% else %}
                <a href="/login/" class="nav-item">
                    <i class="fa-solid fa-sign-in-alt"></i> Login
                </a>
                <a href="/signup/" class="nav-item">
                    <i class="fa-solid fa-user-plus"></i> Signup
                </a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="footer">
        <p>&copy; 2026 ZenCommerce. Designed for excellence.</p>
    </footer>

</body>
</html>

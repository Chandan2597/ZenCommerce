{% extends 'base.html' %}
{% block content %}
<div class="auth-container">
    <h2 class="auth-title">Create an Account</h2>
    {% if error %}
    <div style="background: rgba(239, 68, 68, 0.1); color: #EF4444; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem;">
        {{ error }}
    </div>
    {% endif %}
    <form method="POST" action="/signup/">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">First Name</label>
            <input type="text" name="firstname" class="form-control" value="{{ values.first_name }}" required placeholder="John">
        </div>
        <div class="form-group">
            <label class="form-label">Last Name</label>
            <input type="text" name="lastname" class="form-control" value="{{ values.last_name }}" required placeholder="Doe">
        </div>
        <div class="form-group">
            <label class="form-label">Phone</label>
            <input type="tel" name="phone" class="form-control" value="{{ values.phone }}" required placeholder="+1 234 567 8900">
        </div>
        <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control" value="{{ values.email }}" required placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Sign Up</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        Already have an account? <a href="/login/" style="color: var(--primary); font-weight: 500;">Log in</a>
    </p>
</div>
{% endblock %}
